<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="配布地図" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>配布地図</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=45" />
  </head>
  <body>
    <main id="app">
      <div id="map" aria-label="配布地図"></div>
      <aside class="attribution" aria-label="出典">
        <a href="about.html?v=45#references">出典</a>
      </aside>

      <section class="top-panel" aria-label="検索と地図操作">
        <form id="searchForm" class="search-bar">
          <input id="addressInput" autocomplete="street-address" inputmode="search" placeholder="住所" />
          <button type="submit" aria-label="検索">⌕</button>
        </form>
        <div id="suggestionPanel" class="suggestion-panel hidden" aria-label="住所候補"></div>
        <div class="tool-row">
          <button id="locateButton" class="icon-button locate-button" type="button" aria-label="現在地">
            <span class="locate-icon" aria-hidden="true">⌖</span>
            <span>現在地</span>
          </button>
          <button id="clearAreaButton" class="text-button area-clear-button" type="button">範囲解除</button>
          <span id="areaTotal" class="area-total">範囲内配布枚数 0枚</span>
          <button id="menuButton" class="icon-button" type="button" aria-label="メニュー">☰</button>
        </div>
        <div id="menuPanel" class="menu-panel hidden" aria-label="メニュー">
          <button id="drawButton" type="button">手動範囲作成</button>
          <button id="exportButton" type="button">データ書出</button>
          <label class="menu-file-button">
            データ読込
            <input id="backupInput" type="file" accept=".json,application/json" />
          </label>
          <button id="deleteAreaRecordsButton" class="menu-danger-button" type="button">範囲内削除</button>
          <button id="initializeButton" class="menu-danger-button" type="button">初期化</button>
          <a class="menu-link-button" href="about.html?v=45">PostingMapについて</a>
          <button id="versionCheckButton" type="button">バージョン確認</button>
          <div class="menu-support" aria-label="開発者を支援する">
            <div class="menu-support-title">開発者を支援する</div>
            <a class="support-button" href="https://buy.stripe.com/5kQ6oH4zc4Ad0FqeApd7q01" target="_blank" rel="noreferrer">300円支援</a>
            <a class="support-button" href="https://buy.stripe.com/3cI28r1n02s573O8c1d7q02" target="_blank" rel="noreferrer">500円支援</a>
            <a class="support-button" href="https://buy.stripe.com/5kQ7sL8Ps3w9dscak9d7q03" target="_blank" rel="noreferrer">1000円支援</a>
          </div>
        </div>
      </section>

      <section id="drawPanel" class="draw-panel hidden" aria-label="範囲作成">
        <span id="drawCount">0点</span>
        <button id="undoPointButton" type="button">戻す</button>
        <button id="finishAreaButton" type="button">確定</button>
        <button id="cancelDrawButton" type="button">中止</button>
      </section>

      <section id="statusPanel" class="status-panel" aria-label="建物ステータス">
        <button id="panelGrabber" class="grabber" type="button" aria-label="パネル開閉"></button>
        <span id="selectedLabel" class="sr-only"></span>
        <div class="record-row">
          <label class="count-field" aria-label="配布枚数">
            <select id="deliveryCountInput">
              <option value="">0</option>
            </select>
            <span>枚</span>
          </label>
          <button id="memoButton" class="memo-status-button" type="button" aria-label="メモ">
            <span class="memo-icon">✎</span>
            <span id="memoPreview" class="memo-preview">メモ</span>
          </button>
          <button id="deleteRecordButton" class="danger-button record-delete-button" type="button">この建物の記録を削除</button>
        </div>
        <div class="status-grid">
          <button class="status-button status-done" data-status="done" type="button">配布済</button>
          <button class="status-button status-nonresidential" data-status="nonresidential" type="button">非住居</button>
          <button class="status-button status-banned" data-status="banned" type="button">配布禁止</button>
        </div>
      </section>

      <dialog id="memoDialog">
        <form method="dialog" class="memo-card">
          <h2>メモ</h2>
          <textarea id="memoText" rows="7" placeholder="ポスト位置、注意事項、表札名など"></textarea>
          <div class="dialog-actions">
            <button id="deleteBuildingButton" class="danger-button" value="delete" type="button">削除</button>
            <button value="cancel">閉じる</button>
            <button id="saveMemoButton" class="primary-button" value="save" type="button">保存</button>
          </div>
        </form>
      </dialog>

      <dialog id="confirmDeleteDialog">
        <form method="dialog" class="memo-card">
          <h2>記録削除</h2>
          <p class="dialog-copy">この建物の記録を本当に消しますか？</p>
          <div class="dialog-actions confirm-actions">
            <span></span>
            <button value="cancel">やめる</button>
            <button id="confirmDeleteButton" class="danger-primary-button" value="delete" type="button">消す</button>
          </div>
        </form>
      </dialog>

      <dialog id="confirmClearAreaDialog">
        <form method="dialog" class="memo-card">
          <h2>範囲解除</h2>
          <p class="dialog-copy">選択範囲を解除しますか？</p>
          <div class="dialog-actions confirm-actions">
            <span></span>
            <button value="cancel">やめる</button>
            <button id="confirmClearAreaButton" class="danger-primary-button" value="clear" type="button">解除</button>
          </div>
        </form>
      </dialog>

      <dialog id="confirmDeleteAreaRecordsDialog">
        <form method="dialog" class="memo-card">
          <h2>範囲内削除</h2>
          <p class="dialog-copy">選択範囲内の建物記録から、選んだ項目を本当に消しますか？</p>
          <p id="deleteAreaRecordsSummary" class="dialog-note">対象 0件</p>
          <fieldset class="delete-options" data-scope="area">
            <label><input type="checkbox" data-delete-field="status" /> ステータス</label>
            <label><input type="checkbox" data-delete-field="memo" /> メモ</label>
            <label><input type="checkbox" data-delete-field="deliveryCount" /> 枚数</label>
          </fieldset>
          <div class="dialog-actions confirm-actions">
            <span></span>
            <button value="cancel">やめる</button>
            <button id="confirmDeleteAreaRecordsButton" class="danger-primary-button" value="delete" type="button">消す</button>
          </div>
        </form>
      </dialog>

      <dialog id="confirmInitializeDialog">
        <form method="dialog" class="memo-card">
          <h2>初期化</h2>
          <p class="dialog-copy">選んだ項目を本当に消しますか？</p>
          <fieldset class="delete-options" data-scope="all">
            <label><input type="checkbox" data-delete-field="status" /> ステータス</label>
            <label><input type="checkbox" data-delete-field="memo" /> メモ</label>
            <label><input type="checkbox" data-delete-field="deliveryCount" /> 枚数</label>
            <label><input type="checkbox" data-delete-field="area" /> 選択範囲</label>
          </fieldset>
          <div class="dialog-actions confirm-actions">
            <span></span>
            <button value="cancel">やめる</button>
            <button id="confirmInitializeButton" class="danger-primary-button" value="initialize" type="button">初期化</button>
          </div>
        </form>
      </dialog>

      <div id="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="app.js?v=45"></script>
  </body>
</html>
